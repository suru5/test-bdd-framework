# Extent Reports Cucumber 7 Adapter Config
extent.reporter.spark.start=true
extent.reporter.spark.out=reports/extent/ExtentReport.html

# Klov (MongoDB-based server) - optional
#extent.reporter.klov.start=false

# Attach screenshots to report
screenshot.dir=reports/screenshots/
screenshot.rel.path=../../screenshots/

# System info shown in report
systeminfo.os=${os.name}
systeminfo.java=${java.version}
