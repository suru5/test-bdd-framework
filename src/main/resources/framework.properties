# ============================================================
# BDD Selenium Framework Configuration
# https://the-internet.herokuapp.com — Login Test Suite
# ============================================================

# ─── Browser ────────────────────────────────────────────────
browser=chrome
headless=false
browser.maximize=true

# ─── Timeouts (seconds) ─────────────────────────────────────
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# ─── Application ─────────────────────────────────────────────
base.url=https://www.saucedemo.com/inventory.html
environment=qa

# ─── Data Files (classpath relative) ─────────────────────────
locators.path=locators/locators.json
testdata.path=testdata/testdata.json

# ─── Reporting ───────────────────────────────────────────────
# Screenshots captured after every step (see TestHooks @AfterStep)
screenshot.on.failure=true
screenshot.on.pass=true
extent.report.path=reports/extent/ExtentReport.html

# ─── Retry ───────────────────────────────────────────────────
retry.count=1
